name: CROUS monitor (Grenoble area)

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crous-monitor-grenoble
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run CROUS monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Save updated monitor state
        run: |
          git config user.name "crous-monitor-bot"
          git config user.email "crous-monitor-bot@users.noreply.github.com"
          git add crous_grenoble_state.json
          git diff --cached --quiet || git commit -m "Update CROUS Grenoble state"
          git push
